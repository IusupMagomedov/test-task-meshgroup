spring.application.name=test-task

# datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/testtask
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# flyway
spring.flyway.enabled=false

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# jwt
app.jwt.secret=3c8f2a94b6d1e7f053219a8c4b7e6d3f1a2b5c8d9e0f1234567890abcdef1234
app.jwt.expiration-ms=86400000

# scheduler
app.scheduler.interval-ms=30000

# logging
logging.level.meshgroup.testtask=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
